site_name: MASSIVE
site_url: https://mitchso.github.io/MASSIVE
repo_url: https://github.com/mitchso/MASSIVE
repo_name: mitchso/MASSIVE

theme:
  name: material
  palette:
    scheme: slate
    primary: indigo
    accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - search.suggest
    - search.highlight

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true

nav:
  - Home: index.md
  - Guides:
    - Planning an Experiment: guides/plan-experiment.md
    - Analyzing an Experiment: guides/analyze-experiment.md
    - Scoring Enzymes: guides/score-enzymes.md
  - API Reference:
    - Analytes: api/analytes.md
    - Experiment: api/experiment.md
    - Helper: api/helper.md
    - Metadata: api/metadata.md
    - Scoring: api/scoring.md
    - Sample: api/sample.md